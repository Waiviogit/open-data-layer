# Local infrastructure only: Postgres, Redis, IPFS with ports published to the host.
# Use this when running apps with `pnpm nx serve` directly on the host.
#
# Usage:
#   docker compose -f docker-compose.infra.yml up -d
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  postgres:
    image: postgis/postgis:18-3.6
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:8.6
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    logging: *default-logging

  ipfs:
    image: ipfs/kubo:v0.40.1
    ports:
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:8080:8080"
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  ipfs_data:
