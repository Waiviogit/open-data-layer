services:
  postgres:
    image: postgis/postgis:18-3.6
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

  redis:
    image: redis:8.6
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  ipfs:
    image: ipfs/kubo:v0.40.1
    ports:
      - "${IPFS_API_PORT:-5001}:5001"
      - "${IPFS_GATEWAY_PORT:-8080}:8080"
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    restart: unless-stopped

  chain-indexer:
    build:
      context: .
      dockerfile: apps/chain-indexer/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - ipfs
    restart: unless-stopped

  ipfs-gateway:
    build:
      context: .
      dockerfile: apps/ipfs-gateway/Dockerfile
    ports:
      - "${IPFS_GATEWAY_APP_PORT:-3001}:3001"
    environment:
      PORT: "3001"
    env_file:
      - .env
    depends_on:
      - ipfs
    restart: unless-stopped

  query-api:
    build:
      context: .
      dockerfile: apps/query-api/Dockerfile
    ports:
      - "${QUERY_API_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ipfs_data:
