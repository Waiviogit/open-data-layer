# Default compose: local Postgres/Redis/IPFS with ports published to the host.
# Run apps with `pnpm nx serve` on the host against this infra.
#
# Full stacks:
#   manual build  → docker-compose.manual.yml
#   staging       → docker-compose.staging.{infra,apps}.yml
#   production    → docker-compose.production.{infra,apps}.yml
include:
  - docker-compose.infra.yml
