# GHCR app images (staging). `stack-watchdog` pulls/upgrades images periodically; optional Portainer.
# Requires shared network `opden-data-layer-net` (created by scripts/setup-vps.sh).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  migrator:
    image: ghcr.io/waiviogit/migrator:staging
    pull_policy: always
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    networks:
      - opden-data-layer-net
    restart: "no"
    logging: *default-logging

  chain-indexer:
    image: ghcr.io/waiviogit/chain-indexer:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      ODL_NETWORK: ${ODL_NETWORK:-testnet}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      IPFS_API_URL: ${IPFS_API_URL:-http://ipfs:5001}
    networks:
      - opden-data-layer-net
    restart: unless-stopped
    logging: *default-logging

  ipfs-gateway:
    image: ghcr.io/waiviogit/ipfs-gateway:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${IPFS_GATEWAY_APP_PORT:-7300}
      IPFS_API_URL: ${IPFS_API_URL:-http://ipfs:5001}
    networks:
      - opden-data-layer-net
    restart: unless-stopped
    logging: *default-logging

  query-api:
    image: ghcr.io/waiviogit/query-api:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${QUERY_API_PORT:-7000}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_POOL_MAX: ${POSTGRES_POOL_MAX:-10}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    networks:
      - opden-data-layer-net
    restart: unless-stopped
    logging: *default-logging

  auth-api:
    image: ghcr.io/waiviogit/auth-api:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${AUTH_API_PORT:-7100}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    networks:
      - opden-data-layer-net
    restart: unless-stopped
    logging: *default-logging

  notifications:
    image: ghcr.io/waiviogit/notifications:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${NOTIFICATIONS_PORT:-7200}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    networks:
      - opden-data-layer-net
    restart: unless-stopped
    logging: *default-logging

  scheduler:
    image: ghcr.io/waiviogit/scheduler:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
    networks:
      - opden-data-layer-net
    restart: unless-stopped
    logging: *default-logging

  web:
    image: ghcr.io/waiviogit/web:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${WEB_PORT:-3000}
      ODL_NETWORK: ${ODL_NETWORK:-testnet}
      QUERY_API_URL: ${QUERY_API_URL:-http://query-api:7000}
      AUTH_API_BASE_URL: ${AUTH_API_BASE_URL:-http://auth-api:7100}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-${JWT_SECRET:-change-me-min-16-chars-for-dev}}
    networks:
      - opden-data-layer-net
    restart: unless-stopped
    logging: *default-logging

  stack-watchdog:
    image: ghcr.io/waiviogit/stack-watchdog:staging
    pull_policy: always
    user: root
    env_file:
      - .env
    environment:
      DEPLOY_ENV: staging
      INSTALL_DIR: ${INSTALL_DIR:-/opt/open-data-layer}
      STACK_WATCHDOG_ENABLED: 'true'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${INSTALL_DIR:-/opt/open-data-layer}:${INSTALL_DIR:-/opt/open-data-layer}:ro
    networks:
      - opden-data-layer-net
    restart: unless-stopped
    logging: *default-logging

networks:
  opden-data-layer-net:
    name: opden-data-layer-net
    external: true
