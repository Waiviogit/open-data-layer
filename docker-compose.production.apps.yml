# GHCR app images (production). `stack-watchdog` pulls/upgrades images periodically; optional Portainer.
# Requires shared network `opden-data-layer-net` (created by scripts/setup-vps.sh).
services:
  migrator:
    image: ghcr.io/waiviogit/migrator:production
    pull_policy: always
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    networks:
      - opden-data-layer-net
    restart: "no"

  chain-indexer:
    image: ghcr.io/waiviogit/chain-indexer:production
    pull_policy: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      IPFS_API_URL: ${IPFS_API_URL:-http://ipfs:5001}
    networks:
      - opden-data-layer-net
    restart: unless-stopped

  ipfs-gateway:
    image: ghcr.io/waiviogit/ipfs-gateway:production
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${IPFS_GATEWAY_APP_PORT:-7300}
      IPFS_API_URL: ${IPFS_API_URL:-http://ipfs:5001}
    networks:
      - opden-data-layer-net
    restart: unless-stopped

  query-api:
    image: ghcr.io/waiviogit/query-api:production
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${QUERY_API_PORT:-7000}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_POOL_MAX: ${POSTGRES_POOL_MAX:-10}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    networks:
      - opden-data-layer-net
    restart: unless-stopped

  auth-api:
    image: ghcr.io/waiviogit/auth-api:production
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${AUTH_API_PORT:-7100}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    networks:
      - opden-data-layer-net
    restart: unless-stopped

  notifications:
    image: ghcr.io/waiviogit/notifications:production
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${NOTIFICATIONS_PORT:-7200}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    networks:
      - opden-data-layer-net
    restart: unless-stopped

  scheduler:
    image: ghcr.io/waiviogit/scheduler:production
    pull_policy: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
    networks:
      - opden-data-layer-net
    restart: unless-stopped

  web:
    image: ghcr.io/waiviogit/web:production
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${WEB_PORT:-3000}
      QUERY_API_URL: ${QUERY_API_URL:-http://query-api:7000}
      AUTH_API_BASE_URL: ${AUTH_API_BASE_URL:-http://auth-api:7100}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-${JWT_SECRET:-change-me-min-16-chars-for-dev}}
    networks:
      - opden-data-layer-net
    restart: unless-stopped

  stack-watchdog:
    image: ghcr.io/waiviogit/stack-watchdog:production
    pull_policy: always
    user: root
    env_file:
      - .env
    environment:
      DEPLOY_ENV: production
      INSTALL_DIR: ${INSTALL_DIR:-/opt/open-data-layer}
      STACK_WATCHDOG_ENABLED: 'true'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${INSTALL_DIR:-/opt/open-data-layer}:${INSTALL_DIR:-/opt/open-data-layer}:ro
    networks:
      - opden-data-layer-net
    restart: unless-stopped

networks:
  opden-data-layer-net:
    name: opden-data-layer-net
    external: true
