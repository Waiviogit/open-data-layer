# Pre-built app images from GHCR (staging tag).
# Manual local builds: use docker-compose.manual.yml
services:
  postgres:
    image: postgis/postgis:18-3.6
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

  redis:
    image: redis:8.6
    volumes:
      - redis_data:/data
    restart: unless-stopped

  ipfs:
    image: ipfs/kubo:v0.40.1
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    restart: unless-stopped

  chain-indexer:
    image: ghcr.io/waiviogit/chain-indexer:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      IPFS_API_URL: ${IPFS_API_URL:-http://ipfs:5001}
    depends_on:
      - postgres
      - redis
      - ipfs
    restart: unless-stopped

  ipfs-gateway:
    image: ghcr.io/waiviogit/ipfs-gateway:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${IPFS_GATEWAY_APP_PORT:-3001}
      IPFS_API_URL: ${IPFS_API_URL:-http://ipfs:5001}
    depends_on:
      - ipfs
    restart: unless-stopped

  query-api:
    image: ghcr.io/waiviogit/query-api:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${QUERY_API_PORT:-3000}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_POOL_MAX: ${POSTGRES_POOL_MAX:-10}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  auth-api:
    image: ghcr.io/waiviogit/auth-api:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${AUTH_API_PORT:-7100}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  notifications:
    image: ghcr.io/waiviogit/notifications:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      PORT: ${NOTIFICATIONS_PORT:-7200}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    restart: unless-stopped

  scheduler:
    image: ghcr.io/waiviogit/scheduler:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  web:
    image: ghcr.io/waiviogit/web:staging
    pull_policy: always
    env_file:
      - .env
    environment:
      QUERY_API_URL: ${QUERY_API_URL:-http://query-api:3000}
      AUTH_API_BASE_URL: ${AUTH_API_BASE_URL:-http://auth-api:7100}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-${JWT_SECRET:-change-me-min-16-chars-for-dev}}
    depends_on:
      - query-api
      - auth-api
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    pull_policy: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

  nginx:
    image: jonasal/nginx-certbot:latest
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      DOMAIN: ${DOMAIN}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - web
      - query-api
      - auth-api
      - notifications
      - ipfs-gateway
      - portainer
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ipfs_data:
  letsencrypt:
  portainer_data:
