# VPS infra: Postgres, Redis, IPFS, nginx + Portainer CE (Docker UI, localhost-only).
# Shared Docker network for the separate apps stack (operator-managed: CLI or Portainer).
# Bootstrap: scripts/setup-vps.sh (creates external network, brings up infra then apps).
services:
  postgres:
    image: postgis/postgis:18-3.6
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - opden-data-layer-net
    restart: unless-stopped

  redis:
    image: redis:8.6
    volumes:
      - redis_data:/data
    networks:
      - opden-data-layer-net
    restart: unless-stopped

  ipfs:
    image: ipfs/kubo:v0.40.1
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    networks:
      - opden-data-layer-net
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:2.33.6
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    ports:
      - '127.0.0.1:9443:9443'
    networks:
      - opden-data-layer-net

  nginx:
    image: jonasal/nginx-certbot:latest
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      DOMAIN: ${DOMAIN}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - letsencrypt:/etc/letsencrypt
    networks:
      - opden-data-layer-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ipfs_data:
  letsencrypt:
  portainer_data:

networks:
  opden-data-layer-net:
    name: opden-data-layer-net
    external: true
