# Full stack built from local sources (no GHCR images).
# Use when you need to build and test all apps together on a server or CI without pushing images.
#
# For local host development (pnpm nx serve): use docker-compose.infra.yml instead.
# Pre-built images: docker-compose.<env>.apps.yml (+ docker-compose.<env>.infra.yml on VPS)
services:
  postgres:
    image: postgis/postgis:18-3.6
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

  migrator:
    build:
      context: .
      dockerfile: apps/migrator/Dockerfile
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      - postgres
    restart: "no"

  redis:
    image: redis:8.6
    volumes:
      - redis_data:/data
    restart: unless-stopped

  ipfs:
    image: ipfs/kubo:v0.40.1
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    restart: unless-stopped

  chain-indexer:
    build:
      context: .
      dockerfile: apps/chain-indexer/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      IPFS_API_URL: ${IPFS_API_URL:-http://ipfs:5001}
    depends_on:
      - postgres
      - redis
      - ipfs
    restart: unless-stopped

  ipfs-gateway:
    build:
      context: .
      dockerfile: apps/ipfs-gateway/Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${IPFS_GATEWAY_APP_PORT:-7300}
      IPFS_API_URL: ${IPFS_API_URL:-http://ipfs:5001}
    depends_on:
      - ipfs
    restart: unless-stopped

  query-api:
    build:
      context: .
      dockerfile: apps/query-api/Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${QUERY_API_PORT:-7000}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_POOL_MAX: ${POSTGRES_POOL_MAX:-10}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  auth-api:
    build:
      context: .
      dockerfile: apps/auth-api/Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${AUTH_API_PORT:-7100}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  notifications:
    build:
      context: .
      dockerfile: apps/notifications/Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${NOTIFICATIONS_PORT:-7200}
      JWT_SECRET: ${JWT_SECRET:-change-me-min-16-chars-for-dev}
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-odl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URI: ${REDIS_URI:-redis://redis:6379}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${WEB_PORT:-3000}
      QUERY_API_URL: ${QUERY_API_URL:-http://query-api:7000}
      AUTH_API_BASE_URL: ${AUTH_API_BASE_URL:-http://auth-api:7100}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-${JWT_SECRET:-change-me-min-16-chars-for-dev}}
    depends_on:
      - query-api
      - auth-api
    restart: unless-stopped

  nginx:
    image: jonasal/nginx-certbot:latest
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      DOMAIN: ${DOMAIN}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - web
      - query-api
      - auth-api
      - notifications
      - ipfs-gateway
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ipfs_data:
  letsencrypt:
