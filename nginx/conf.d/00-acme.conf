# Permanent HTTP server: serves ACME challenge and redirects everything else to HTTPS.
# This file has NO ssl_certificate directive so jonasal/nginx-certbot never disables it.
# nginx listens on port 80 even while the cert is being obtained for the first time.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
